name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ios-build-and-test:
    runs-on: macos-26
    defaults:
      run:
        working-directory: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode and Swift versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: SwiftLint (optional)
        run: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --strict
          else
            echo "swiftlint not installed on runner; skipping"
          fi

  android-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build
